name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.58.1'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libcurl4-openssl-dev pkg-config

      - name: Configure (warning-clean)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror"

      - name: Build
        run: cmake --build build --parallel

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1 || true

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          # Wait for the daemon to become healthy (max ~30s).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run tests
        working-directory: build
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: ctest --output-on-failure

      - name: Cache mongreldb native libraries
        id: native-cache
        uses: actions/cache@v6
        with:
          path: native
          key: mongreldb-native-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb native libraries
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p native
          curl -fsSL \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-native-linux-x64-gnu.tar.gz" \
            | tar xz -C native
          curl -fsSL \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-kit-native-linux-x64-gnu.tar.gz" \
            | tar xz -C native
          test -f native/mongreldb-native/lib/libmongreldb.so
          test -f native/mongreldb-kit-native/lib/libmongreldb_kit.so
          test -f native/mongreldb-kit-native/include/mongreldb_kit.h

      - name: Run examples
        run: |
          for ex in examples/*.cpp; do
            echo "=== Running $ex ==="
            case "$ex" in
              examples/native_*.cpp)
                # Native (Kit FFI) examples link libmongreldb_kit +
                # libmongreldb in-process; the daemon is not used.
                g++ -std=c++17 \
                  -Iinclude \
                  -Inative/mongreldb-native/include \
                  -Inative/mongreldb-kit-native/include \
                  -o /tmp/ex "$ex" \
                  -Lnative/mongreldb-kit-native/lib -lmongreldb_kit \
                  -Lnative/mongreldb-native/lib -lmongreldb \
                  -lpthread -ldl -lm \
                  -Wl,-rpath,"$(pwd)"/native/mongreldb-kit-native/lib \
                  -Wl,-rpath,"$(pwd)"/native/mongreldb-native/lib
                ;;
              *)
                # HTTP client examples compile against the bundled headers
                # and talk to the running daemon over libcurl.
                g++ -std=c++17 -Iinclude -o /tmp/ex "$ex" src/mongreldb.cpp -lcurl
                ;;
            esac
            /tmp/ex || { echo "FAILED: $ex"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
